<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3R Social Menu - Sub-Page Cut</title>
  <link href="https://fonts.googleapis.com/css2?family=Impact&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --p3r-cobalt-dark: #002288;
      --p3r-cobalt-base: #0040c8;
      --p3r-cobalt-bright: #0052e0;
      --menu-cyan: #26e6ff;
      --active-pink: #ff0055;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #000; 
      color: #fff;
      font-family: 'Impact', 'Arial Black', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* Screen Shake/Impact Animation */
    body.impact-active {
      animation: cameraImpact 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
    }
    @keyframes cameraImpact {
      0% { transform: scale(1.03) translate(-8px, -5px) rotate(-0.5deg); }
      50% { transform: scale(0.99) translate(5px, 3px) rotate(0.3deg); }
      100% { transform: scale(1) translate(0, 0) rotate(0deg); }
    }

    /* --- BACKGROUND SCANLINES --- */
    .p3r-bg-stripes {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        #0033ad,
        #0033ad 4px,
        #0042cf 4px,
        #0042cf 8px
      );
      z-index: 1;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    body.game-active .p3r-bg-stripes { opacity: 1; }

    /* --- AMBIENT PARTICLES CANVAS --- */
    #ambient-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0; 
      transition: opacity 0.8s ease;
      mix-blend-mode: screen;
    }
    body.game-active #ambient-canvas { opacity: 1; }

    /* --- BACKGROUND TICKER --- */
    .bg-ticker {
      position: absolute;
      top: 18%; left: -10%;
      width: 140%;
      font-size: 11rem;
      color: rgba(255, 255, 255, 0.05);
      white-space: nowrap;
      font-style: italic;
      z-index: 2;
      pointer-events: none;
      transform: rotate(-5deg);
      animation: scrollTicker 35s linear infinite;
    }
    
    @keyframes scrollTicker {
      0% { transform: rotate(-5deg) translateX(0); }
      100% { transform: rotate(-5deg) translateX(-50%); }
    }

    /* --- THE WHITE WEDGE --- */
    .game-left-white-wedge {
      position: absolute;
      top: 0; left: 0;
      width: 36vw; height: 100%;
      background: rgba(255, 255, 255, 0.96);
      clip-path: polygon(0 0, 100% 0, 75% 100%, 0% 100%);
      z-index: 3;
      box-shadow: 25px 0 50px rgba(0, 20, 80, 0.6);
      opacity: 0;
      transform: translateX(-100%);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: flex-end;
    }
    body.game-active .game-left-white-wedge {
      opacity: 1;
      transform: translateX(0);
    }
    .wedge-text {
      font-size: 14rem;
      color: #dce3f0;
      transform: rotate(-90deg) translateY(20px);
      transform-origin: left bottom;
      letter-spacing: -5px;
      margin-bottom: 50px;
    }

    /* --- AMBIENT BACKLIGHT BLUR AURA --- */
    .character-backlight-blur {
      position: absolute;
      bottom: -10%;
      left: 10vw;
      width: 40vw;
      height: 90vh;
      background: radial-gradient(circle, rgba(0, 82, 224, 0.75) 0%, rgba(38, 230, 255, 0.35) 45%, transparent 75%);
      filter: blur(50px);
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }
    body.game-active .character-backlight-blur { opacity: 1; }

    /* --- CHARACTER CONTAINER (INTEGRATED TOP LAYER) --- */
    .p3r-character-container {
      position: absolute;
      bottom: 0; left: 0;
      height: 100vh; width: 100vw; 
      z-index: 10;
      pointer-events: none;
      display: flex; align-items: flex-end;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    body.game-active .p3r-character-container { opacity: 1; }

    .character-parallax-wrapper {
      height: 100%; width: 100%;
      display: flex; align-items: flex-end;
      transform: translateX(45vw);
      transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1.02);
    }
    body.game-active .character-parallax-wrapper {
      transform: translateX(0);
    }

    .p3r-character-art {
      height: 105%; width: auto;
      object-fit: contain; object-position: left bottom;
      transform-origin: left bottom;
      opacity: 0.97;
      
      filter: 
        drop-shadow(0px 0px 45px rgba(0, 30, 140, 0.85)) 
        drop-shadow(0px 0px 20px rgba(38, 230, 255, 0.4))
        contrast(1.05) 
        saturate(1.1) 
        brightness(0.95);

      animation: floatCharacterMirror 4s ease-in-out infinite alternate;
      animation-play-state: paused;
      transition: transform 0.15s ease-out;
    }
    body.game-active .p3r-character-art { animation-play-state: running; }

    .p3r-character-art.recoil {
      transform: scale(1.06) translate(-10px, -5px) !important;
    }

    @keyframes floatCharacterMirror {
      0% { transform: scale(1); }
      100% { transform: scale(1.025); }
    }

    /* --- 3D MENU LAYER --- */
    .p3r-game-screen {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      z-index: 5;
      padding-right: 8vw;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    body.subpage-open .p3r-game-screen {
      opacity: 0;
      transform: translateX(100px);
      pointer-events: none;
    }

    .menu-cascading-barrel {
      transform: rotateY(-25deg) rotateZ(-5deg) skewX(-5deg);
      transform-style: preserve-3d;
      perspective: 1000px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      pointer-events: auto;
    }

    .menu-item-row {
      font-size: 5rem;
      font-style: italic;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      letter-spacing: 2px;
      padding: 0px 40px;
      opacity: 0;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(255,255,255,0.4);
      transition: all 0.2s cubic-bezier(0.25, 1.25, 0.5, 1.3);
    }

    body.game-active .menu-item-row {
      animation: menuElasticIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
    }

    .menu-item-row:hover:not(.selected) {
      color: var(--menu-cyan);
      -webkit-text-stroke: 0px;
      transform: translateX(-15px) scale(1.05);
      text-shadow: 0px 0px 15px rgba(38, 230, 255, 0.7);
    }

    .menu-item-row.selected {
      color: #000 !important;
      -webkit-text-stroke: 0px;
      font-size: 5.5rem;
      transform: translateX(-30px) scale(1.1);
      z-index: 10;
    }

    .menu-item-row.selected::before {
      content: '';
      position: absolute;
      top: 50%; left: -20%;
      width: 150%; height: 110%;
      background: var(--active-pink);
      clip-path: polygon(0 0, 100% 15%, 95% 100%, 5% 85%);
      z-index: -1;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      animation: violentSlice 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
    }

    @keyframes menuElasticIn {
      0% { opacity: 0; transform: translateX(100px) rotateX(45deg); }
      100% { opacity: 1; transform: translateX(0) rotateX(0deg); }
    }
    @keyframes violentSlice {
      0% { transform: translateY(-50%) scaleX(0) skewX(-20deg); }
      100% { transform: translateY(-50%) scaleX(1) skewX(0deg); }
    }

    /* --- NEW SUB-PAGE VIEW --- */
    .p3r-subpage {
      position: absolute;
      inset: 0;
      z-index: 12;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      padding-right: 12vw;
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05) skewX(-2deg);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    body.subpage-open .p3r-subpage {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1) skewX(0deg);
    }

    .subpage-card {
      width: 45vw;
      background: rgba(0, 15, 45, 0.9);
      border-left: 6px solid var(--menu-cyan);
      border-right: 4px solid var(--active-pink);
      padding: 40px 50px;
      transform: skewX(-10deg);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    .subpage-title {
      font-size: 5rem;
      font-style: italic;
      color: #fff;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(38, 230, 255, 0.5);
    }

    .subpage-body {
      font-family: Arial, sans-serif;
      font-size: 1.2rem;
      color: #dce3f0;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    /* P3R BACK BUTTON */
    .p3r-back-btn {
      display: inline-block;
      background: var(--active-pink);
      color: #fff;
      font-family: 'Impact', sans-serif;
      font-size: 2rem;
      font-style: italic;
      padding: 12px 45px;
      clip-path: polygon(12% 0, 100% 0, 88% 100%, 0 100%);
      cursor: pointer;
      border: none;
      outline: none;
      letter-spacing: 2px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 5px 5px 0px #000;
    }
    .p3r-back-btn:hover {
      background: var(--menu-cyan);
      color: #000;
      transform: scale(1.08) translateX(-5px);
      box-shadow: 8px 8px 0px rgba(0,0,0,0.8);
    }

    /* --- FULL SCREEN SLASH TRANSITION OVERLAY --- */
    .slash-transition-layer {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      overflow: hidden;
    }
    .slash-blade-1, .slash-blade-2 {
      position: absolute;
      width: 200vw;
      height: 120px;
      top: 40%;
      left: -50vw;
      transform: rotate(-15deg) translateY(-1000px);
    }
    .slash-blade-1 { background: var(--active-pink); opacity: 0.85; }
    .slash-blade-2 { background: var(--menu-cyan); opacity: 0.9; height: 60px; top: 48%; }

    .slash-blade-1.trigger { animation: bladeSweep 0.35s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
    .slash-blade-2.trigger { animation: bladeSweep 0.35s 0.04s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }

    @keyframes bladeSweep {
      0% { transform: rotate(-15deg) translateY(-800px) scaleY(1); }
      50% { transform: rotate(-15deg) translateY(0px) scaleY(1.8); }
      100% { transform: rotate(-15deg) translateY(800px) scaleY(0.5); }
    }

    /* --- OVERLAYS --- */
    .start-screen-overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; background: #000;
      transition: opacity 0.5s ease;
    }
    .press-start-text {
      font-size: 3.5rem; color: #fff; font-style: italic; letter-spacing: 4px;
      animation: blink 1.2s infinite;
      text-align: center;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    body.game-active .start-screen-overlay { opacity: 0; pointer-events: none; }

    .screen-flash {
      position: absolute; inset: 0; background: #fff; z-index: 99;
      opacity: 0; pointer-events: none;
    }
    .flash-trigger { animation: flashAnimation 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes flashAnimation { 0% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body class="intro-mode">

  <audio id="menu-bgm" src="bgm.mp3" loop></audio>

  <!-- Intro Screen -->
  <div class="start-screen-overlay" id="start-overlay">
    <div class="press-start-text">PRESS ANY BUTTON</div>
  </div>
  <div class="screen-flash" id="flash-overlay"></div>

  <!-- Slash Transition Layer -->
  <div class="slash-transition-layer">
    <div class="slash-blade-1" id="blade1"></div>
    <div class="slash-blade-2" id="blade2"></div>
  </div>

  <!-- Background Layers -->
  <div class="p3r-bg-stripes"></div>
  <div class="bg-ticker">SYSTEM PROTOCOL // SOCIAL STATS // TARTARUS NAVIGATION // SYSTEM PROTOCOL // SOCIAL STATS // </div>
  <canvas id="ambient-canvas"></canvas>

  <!-- Left Wedge -->
  <div class="game-left-white-wedge">
    <div class="wedge-text">NETWORK</div>
  </div>

  <!-- Ambient Light Blur Aura -->
  <div class="character-backlight-blur"></div>

  <!-- 3D Menu Layer -->
  <div class="p3r-game-screen">
    <div class="menu-cascading-barrel" id="menu-barrel">
      <div class="menu-item-row selected" data-platform="Instagram" data-desc="Connecting to Instagram feed... Check out recent photos and updates." style="animation-delay: 0.0s;">Instagram</div>
      <div class="menu-item-row" data-platform="Roblox" data-desc="Entering Roblox experiences... Join games and community events." style="animation-delay: 0.05s;">Roblox</div>
      <div class="menu-item-row" data-platform="TikTok" data-desc="Launching TikTok stream... Explore short video content." style="animation-delay: 0.10s;">TikTok</div>
      <div class="menu-item-row" data-platform="YouTube" data-desc="Opening YouTube channel... Watch latest videos and live broadcasts." style="animation-delay: 0.15s;">YouTube</div>
      <div class="menu-item-row" data-platform="Discord" data-desc="Connecting to Discord server... Chat with voice and text communities." style="animation-delay: 0.20s;">Discord</div>
    </div>
  </div>

  <!-- SUB-PAGE CONTAINER -->
  <div class="p3r-subpage" id="subpage">
    <div class="subpage-card">
      <h1 class="subpage-title" id="subpage-title">INSTAGRAM</h1>
      <p class="subpage-body" id="subpage-desc">Connecting to Instagram feed... Check out recent photos and updates.</p>
      <button class="p3r-back-btn" id="back-btn">&lt; RETURN / BACK</button>
    </div>
  </div>

  <!-- Integrated Character Layer -->
  <div class="p3r-character-container">
    <div class="character-parallax-wrapper" id="char-wrapper">
      <img src="character.PNG" class="p3r-character-art" id="char-art" alt="Makoto Yuki">
    </div>
  </div>

  <script>
    // --- AMBIENT SHARDS CANVAS ENGINE ---
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let elements = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    class Shard {
      constructor() { 
        this.y = Math.random() * canvas.height; 
        this.x = Math.random() * canvas.width; 
        this.speedY = -(Math.random() * 2 + 0.8); 
        this.speedX = (Math.random() - 0.5) * 0.8;
        this.size = Math.random() * 2 + 0.5;
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.04;
      }
      step() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.rot += this.rotSpeed;
        if (this.y < -50) { 
          this.y = canvas.height + 50; 
          this.x = Math.random() * canvas.width; 
        }
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.scale(this.size, this.size);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(14, 4);
        ctx.lineTo(6, 16);
        ctx.closePath();
        ctx.fillStyle = Math.random() > 0.7 ? 'rgba(38, 230, 255, 0.45)' : 'rgba(0, 82, 224, 0.25)';
        ctx.fill();
        ctx.restore();
      }
    }
    for(let i=0; i<45; i++) elements.push(new Shard());

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      elements.forEach(e => { e.step(); e.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    // --- NAVIGATION & INPUT SYSTEM ---
    const rows = document.querySelectorAll('.menu-item-row');
    const flash = document.getElementById('flash-overlay');
    const startOverlay = document.getElementById('start-overlay');
    const bgm = document.getElementById('menu-bgm');
    const charArt = document.getElementById('char-art');
    const blade1 = document.getElementById('blade1');
    const blade2 = document.getElementById('blade2');
    
    // Subpage Elements
    const subpageTitle = document.getElementById('subpage-title');
    const subpageDesc = document.getElementById('subpage-desc');
    const backBtn = document.getElementById('back-btn');

    let hasStarted = false;

    function triggerTransitions() {
      // Impact Recoil
      document.body.classList.remove('impact-active');
      void document.body.offsetWidth;
      document.body.classList.add('impact-active');

      // Blade Slash Animation
      blade1.classList.remove('trigger');
      blade2.classList.remove('trigger');
      void blade1.offsetWidth;
      blade1.classList.add('trigger');
      blade2.classList.add('trigger');

      // Flash Effect
      flash.classList.remove('flash-trigger');
      void flash.offsetWidth; 
      flash.classList.add('flash-trigger');

      // Character Recoil
      charArt.classList.add('recoil');
      setTimeout(() => charArt.classList.remove('recoil'), 150);
    }

    // TRUE "PRESS ANY BUTTON / KEY" HANDLER
    function startExperience() {
      if (hasStarted) return;
      hasStarted = true;

      document.body.classList.remove('intro-mode');
      document.body.classList.add('game-active');

      bgm.volume = 0.5; 
      bgm.play().catch(e => console.log("Audio prep:", e));

      flash.classList.remove('flash-trigger');
      void flash.offsetWidth; 
      flash.classList.add('flash-trigger');

      window.removeEventListener('keydown', startExperience);
      window.removeEventListener('pointerdown', startExperience);
      
      setTimeout(() => isGameActive = true, 800);
    }

    window.addEventListener('keydown', startExperience);
    window.addEventListener('pointerdown', startExperience);

    // --- BUTTON CLICK -> SUB-PAGE OPEN ---
    rows.forEach(row => {
      row.addEventListener('click', () => {
        rows.forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');

        triggerTransitions();

        // Update Sub-page Info & Open
        subpageTitle.textContent = row.dataset.platform;
        subpageDesc.textContent = row.dataset.desc;

        setTimeout(() => {
          document.body.classList.add('subpage-open');
        }, 150);
      });
    });

    // --- BACK BUTTON CLICK -> RETURN TO MENU ---
    backBtn.addEventListener('click', () => {
      triggerTransitions();

      setTimeout(() => {
        document.body.classList.remove('subpage-open');
      }, 150);
    });

    // --- PARALLAX ENGINE ---
    const charWrapper = document.getElementById('char-wrapper');
    const menuBarrel = document.getElementById('menu-barrel');
    let isGameActive = false;

    document.addEventListener('mousemove', (e) => {
      if (!isGameActive) return;
      
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;

      charWrapper.style.transform = `translate(${x * -18}px, ${y * -8}px)`;
      menuBarrel.style.transform = `rotateY(${-25 + (x * 8)}deg) rotateZ(${-5 + (y * 2)}deg) skewX(-5deg) translateY(${y * 12}px)`;
    });
  </script>
</body>
</html>
