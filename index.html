<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3R Social Menu - Atlus Dev Cut</title>
  <link href="https://fonts.googleapis.com/css2?family=Impact&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --p3r-deep-blue: #000c24;
      --p3r-royal-blue: #0033cc;
      --menu-cyan: #26e6ff;
      --active-pink: #ff0055;
      --text-muted: rgba(255, 255, 255, 0.3);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #000; 
      color: #fff;
      font-family: 'Impact', 'Arial Black', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* --- CRT & SCANLINE OVERLAY --- */
    .scanlines {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0, 0, 0, 0.15) 2px, rgba(0, 0, 0, 0.15) 4px);
      z-index: 90;
      pointer-events: none;
      opacity: 0.8;
    }

    /* --- AMBIENT CANVAS BACKGROUND --- */
    #ambient-canvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0; 
      transition: opacity 0.8s ease;
    }
    body.game-active #ambient-canvas { opacity: 1; }

    /* --- STYLIZED GEOMETRY & TICKER TAPE --- */
    .bg-ticker {
      position: absolute;
      top: 15%; left: -10%;
      width: 120%;
      font-size: 10rem;
      color: rgba(255, 255, 255, 0.03);
      white-space: nowrap;
      font-style: italic;
      z-index: 1;
      pointer-events: none;
      transform: rotate(-5deg);
      animation: scrollTicker 30s linear infinite;
    }
    
    @keyframes scrollTicker {
      0% { transform: rotate(-5deg) translateX(0); }
      100% { transform: rotate(-5deg) translateX(-50%); }
    }

    .ui-ring {
      position: absolute;
      border: 2px dashed rgba(38, 230, 255, 0.2);
      border-radius: 50%;
      z-index: 2;
      pointer-events: none;
      animation: spin 20s linear infinite;
    }
    .ring-1 { top: -10%; left: -5%; width: 50vw; height: 50vw; }
    .ring-2 { bottom: -20%; right: -10%; width: 40vw; height: 40vw; border: 1px solid rgba(255, 0, 85, 0.1); animation: spin 25s linear infinite reverse; }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* --- THE WEDGE --- */
    .game-left-white-wedge {
      position: absolute;
      top: 0; left: 0;
      width: 38vw; height: 100%;
      background: rgba(255, 255, 255, 0.95);
      clip-path: polygon(0 0, 100% 0, 75% 100%, 0% 100%);
      z-index: 2;
      box-shadow: 30px 0 50px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateX(-100%);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: flex-end;
    }
    body.game-active .game-left-white-wedge {
      opacity: 1;
      transform: translateX(0);
    }
    .wedge-text {
      font-size: 14rem;
      color: #e3e7ee;
      transform: rotate(-90deg) translateY(20px);
      transform-origin: left bottom;
      letter-spacing: -5px;
      margin-bottom: 50px;
    }

    /* --- CHARACTER PARALLAX & FLOAT --- */
    .p3r-character-container {
      position: absolute;
      bottom: 0; left: 0;
      height: 110vh; width: 100vw; 
      z-index: 3;
      pointer-events: none;
      display: flex; align-items: flex-end;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    body.game-active .p3r-character-container { opacity: 1; }

    /* This wrapper handles the JS mouse parallax */
    .character-parallax-wrapper {
      height: 100%; width: 100%;
      display: flex; align-items: flex-end;
      transform: translateX(45vw); /* Initial offscreen state */
      transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1.02);
    }
    body.game-active .character-parallax-wrapper {
      transform: translateX(0); /* Slides in, then JS takes over */
    }

    /* This handles the vertical breathing/floating */
    .p3r-character-art {
      height: 105%; width: auto;
      object-fit: contain; object-position: left bottom;
      /* Harsh P3 style offset shadow */
      filter: drop-shadow(15px 10px 0px rgba(0, 12, 36, 0.6)) drop-shadow(-2px -2px 0px var(--menu-cyan));
      
      animation: floatCharacterMirror 4s ease-in-out infinite alternate;
      animation-play-state: paused;
    }
    body.game-active .p3r-character-art { animation-play-state: running; }

    @keyframes floatCharacterMirror {
      0% { transform: translateY(0%) scale(1); }
      100% { transform: translateY(-3%) scale(1.015); }
    }

    /* --- 3D CASCADING BARREL MENU --- */
    .p3r-game-screen {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      z-index: 4;
      padding-right: 8vw;
      pointer-events: none;
    }

    .menu-cascading-barrel {
      transform: rotateY(-25deg) rotateZ(-5deg) skewX(-5deg);
      transform-style: preserve-3d;
      perspective: 1000px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      pointer-events: auto;
    }

    .menu-item-row {
      font-size: 5rem;
      font-style: italic;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      letter-spacing: 2px;
      padding: 0px 40px;
      opacity: 0;
      
      /* Hollow text look for unselected */
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(255,255,255,0.4);
      
      transition: all 0.2s cubic-bezier(0.25, 1.25, 0.5, 1.3);
    }

    body.game-active .menu-item-row {
      animation: menuElasticIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
    }

    /* Hover State: Fills in and glows cyan */
    .menu-item-row:hover:not(.selected) {
      color: var(--menu-cyan);
      -webkit-text-stroke: 0px;
      transform: translateX(-15px) scale(1.05);
      text-shadow: 0px 0px 15px rgba(38, 230, 255, 0.6);
    }

    /* Selected State: Solid black, pink slash background */
    .menu-item-row.selected {
      color: #000 !important;
      -webkit-text-stroke: 0px;
      font-size: 5.5rem;
      transform: translateX(-30px) scale(1.1);
      z-index: 10;
    }

    /* The violent pink slash behind selected item */
    .menu-item-row.selected::before {
      content: '';
      position: absolute;
      top: 50%; left: -20%;
      width: 150%; height: 110%;
      background: var(--active-pink);
      /* Sharp angled polygon */
      clip-path: polygon(0 0, 100% 15%, 95% 100%, 5% 85%);
      z-index: -1;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      animation: violentSlice 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
    }

    @keyframes menuElasticIn {
      0% { opacity: 0; transform: translateX(100px) rotateX(45deg); }
      100% { opacity: 1; transform: translateX(0) rotateX(0deg); }
    }
    @keyframes violentSlice {
      0% { transform: translateY(-50%) scaleX(0) skewX(-20deg); }
      100% { transform: translateY(-50%) scaleX(1) skewX(0deg); }
    }

    /* --- FLASH & INTRO --- */
    .start-screen-overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; background: #000;
      transition: opacity 0.5s ease;
    }
    .press-start-text {
      font-size: 4rem; color: #fff; font-style: italic; letter-spacing: 5px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    body.game-active .start-screen-overlay { opacity: 0; pointer-events: none; }

    .screen-flash {
      position: absolute; inset: 0; background: #fff; z-index: 99;
      opacity: 0; pointer-events: none;
    }
    .flash-trigger { animation: flashAnimation 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes flashAnimation { 0% { opacity: 1; } 100% { opacity: 0; } }

  </style>
</head>
<body class="intro-mode">

  <audio id="menu-bgm" src="bgm.mp3" loop></audio>
  <div class="scanlines"></div>

  <!-- Intro Screen -->
  <div class="start-screen-overlay" id="start-overlay">
    <div class="press-start-text">PRESS ANY BUTTON</div>
  </div>
  <div class="screen-flash" id="flash-overlay"></div>

  <!-- Background Layers -->
  <div class="bg-ticker">SYSTEM PROTOCOL // SOCIAL STATS // TARTARUS NAVIGATION // SYSTEM PROTOCOL // SOCIAL STATS // </div>
  <div class="ui-ring ring-1"></div>
  <div class="ui-ring ring-2"></div>
  <canvas id="ambient-canvas"></canvas>

  <!-- Left Wedge -->
  <div class="game-left-white-wedge">
    <div class="wedge-text">NETWORK</div>
  </div>

  <!-- Character Container -->
  <div class="p3r-character-container">
    <div class="character-parallax-wrapper" id="char-wrapper">
      <img src="character.PNG" class="p3r-character-art" alt="Makoto Yuki">
    </div>
  </div>

  <!-- 3D Menu Layer -->
  <div class="p3r-game-screen">
    <div class="menu-cascading-barrel" id="menu-barrel">
      <div class="menu-item-row selected" style="animation-delay: 0.0s;">Instagram</div>
      <div class="menu-item-row" style="animation-delay: 0.05s;">Roblox</div>
      <div class="menu-item-row" style="animation-delay: 0.10s;">TikTok</div>
      <div class="menu-item-row" style="animation-delay: 0.15s;">YouTube</div>
      <div class="menu-item-row" style="animation-delay: 0.20s;">Discord</div>
    </div>
  </div>

  <script>
    // --- CANVAS GRAPHICS ENGINE (Upgraded Shards) ---
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let elements = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    class Shard {
      constructor() { 
        this.y = Math.random() * canvas.height; 
        this.x = Math.random() * canvas.width; 
        this.speedY = -(Math.random() * 2 + 1); 
        this.speedX = (Math.random() - 0.5) * 1;
        this.size = Math.random() * 2 + 0.5;
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.05;
      }
      step() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.rot += this.rotSpeed;
        if (this.y < -50) { 
          this.y = canvas.height + 50; 
          this.x = Math.random() * canvas.width; 
        }
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.scale(this.size, this.size);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(14, 4);
        ctx.lineTo(6, 16);
        ctx.closePath();
        // Give some shards a solid cyan look, others translucent blue
        ctx.fillStyle = Math.random() > 0.8 ? 'rgba(38, 230, 255, 0.4)' : 'rgba(0, 85, 255, 0.15)';
        ctx.fill();
        ctx.restore();
      }
    }
    for(let i=0; i<45; i++) elements.push(new Shard());

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Deep P3R Gradient Background
      let g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      g.addColorStop(0, '#000c24');    
      g.addColorStop(0.5, '#001a66');  
      g.addColorStop(1, '#000511');    
      
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      elements.forEach(e => { e.step(); e.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    // --- SYSTEM NAVIGATION ENGINE ---
    const rows = document.querySelectorAll('.menu-item-row');
    const flash = document.getElementById('flash-overlay');
    const startOverlay = document.getElementById('start-overlay');
    const bgm = document.getElementById('menu-bgm');

    // Start Sequence
    startOverlay.addEventListener('click', () => {
      document.body.classList.remove('intro-mode');
      document.body.classList.add('game-active');

      bgm.volume = 0.5; 
      bgm.play().catch(e => console.log("Audio prep:", e));

      flash.classList.remove('flash-trigger');
      void flash.offsetWidth; 
      flash.classList.add('flash-trigger');
    });

    // Menu Selection
    rows.forEach(row => {
      row.addEventListener('click', () => {
        if(row.classList.contains('selected')) return; // Prevent re-triggering on same item
        
        rows.forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');

        // Dynamic Screen Flash on Selection
        flash.classList.remove('flash-trigger');
        void flash.offsetWidth; 
        flash.classList.add('flash-trigger');
      });
    });

    // --- INTERACTIVE MOUSE PARALLAX (The Secret Sauce) ---
    const charWrapper = document.getElementById('char-wrapper');
    const menuBarrel = document.getElementById('menu-barrel');
    let isGameActive = false;

    // Wait for intro to finish before parallax starts
    startOverlay.addEventListener('click', () => setTimeout(() => isGameActive = true, 800));

    document.addEventListener('mousemove', (e) => {
      if (!isGameActive) return;
      
      // Calculate normalized mouse position (-1 to 1)
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;

      // Move character subtly opposite to mouse
      charWrapper.style.transform = `translate(${x * -20}px, ${y * -10}px)`;
      
      // Pivot the 3D menu slightly based on mouse
      menuBarrel.style.transform = `rotateY(${-25 + (x * 10)}deg) rotateZ(${-5 + (y * 2)}deg) skewX(-5deg) translateY(${y * 15}px)`;
    });
  </script>
</body>
</html>
