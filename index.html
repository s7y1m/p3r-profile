<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3R Main Menu Mirror</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark-ocean: #01112a;
      --menu-cyan: #3fe3ff;
      --active-pink: #ff0055;
      --hud-white: #ffffff;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark-ocean);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* --- BACKGROUND DEEP WATER EFFECTS --- */
    #ambient-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* --- GLOBAL INTERFACE LAYER --- */
    .p3r-game-screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 32% 40% 28%;
      z-index: 2;
    }

    /* --- LEFT SECTION: WALLET HUD & CHARACTER GAP --- */
    .left-canvas-sector {
      position: relative;
      height: 100%;
      padding: 45px;
    }

    .wallet-hud-card {
      position: absolute;
      top: 40px;
      left: 40px;
      background: var(--hud-white);
      color: #000;
      padding: 8px 30px 12px 15px;
      transform: skewX(-12deg);
      border: 3px solid #000;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
    }

    .wallet-label {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 500;
      text-transform: lowercase;
      letter-spacing: 0.5px;
      line-height: 1;
      margin-bottom: 2px;
    }

    .wallet-funds {
      font-family: 'Oswald', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .character-avatar-space {
      position: absolute;
      bottom: -5vh;
      left: -2vw;
      width: 110%;
      height: 80%;
      border: 3px dashed rgba(63, 227, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(63, 227, 255, 0.3);
      transform: rotate(-6deg);
    }

    /* --- CENTER SECTION: SCREENSYNC OVERLAPPING MENU --- */
    .center-menu-sector {
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    .menu-cascading-barrel {
      transform: rotateY(-18deg) rotateZ(-7deg) skewX(-4deg);
      transform-style: preserve-3d;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .menu-item-row {
      font-size: 3.5rem;
      font-style: italic;
      font-weight: 900;
      color: var(--menu-cyan);
      text-transform: uppercase;
      margin: -14px 0; /* Forced vertical compression directly matching image_06395f.jpg */
      cursor: pointer;
      position: relative;
      letter-spacing: -2px;
      width: 90%;
      text-align: left;
      padding-left: 20px;
      transform-style: preserve-3d;
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.1s ease;
      transform-origin: left center;
    }

    .menu-item-row:hover {
      color: #fff;
    }

    /* --- THE ACTIVE CHAOTIC SHARD MECHANIC --- */
    .menu-item-row.selected {
      color: #000 !important;
      font-size: 4.5rem;
      z-index: 10;
      padding: 4px 40px;
      margin: -6px 0;
      text-shadow: 3px 3px 0px var(--active-pink);
    }

    .menu-item-row.selected::before {
      content: '';
      position: absolute;
      top: 0;
      left: -10px;
      width: 115%;
      height: 100%;
      background: #fff;
      /* Generates the exact sharp geometric polygon profile shard */
      clip-path: polygon(4% 0%, 100% 0%, 93% 100%, 0% 100%);
      z-index: -1;
    }

    /* --- RIGHT SECTION: PARTY HUD FRAMES --- */
    .right-party-sector {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 40px;
      gap: 25px;
    }

    .party-member-node {
      width: 65px;
      height: 65px;
      border-radius: 12px;
      border: 3px solid var(--menu-cyan);
      transform: skewY(-8deg);
      background: rgba(63, 227, 255, 0.1);
      box-shadow: -4px 4px 0px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <canvas id="ambient-canvas"></canvas>

  <div class="p3r-game-screen">
    
    <div class="left-canvas-sector">
      <div class="wallet-hud-card">
        <div class="wallet-label">current wallet</div>
        <div class="wallet-funds">¥3,000</div>
      </div>
      <div class="character-avatar-space">[ CHARACTER ART TARGET ]</div>
    </div>

    <div class="center-menu-sector">
      <div class="menu-cascading-barrel" id="main-barrel">
        <div class="menu-item-row selected">Skill</div>
        <div class="menu-item-row">Item</div>
        <div class="menu-item-row">Equip</div>
        <div class="menu-item-row">Persona</div>
        <div class="menu-item-row">Stats</div>
        <div class="menu-item-row">Quest</div>
        <div class="menu-item-row">Social Link</div>
        <div class="menu-item-row">Calendar</div>
        <div class="menu-item-row">System</div>
      </div>
    </div>

    <div class="right-party-sector">
      <div class="party-member-node"></div>
      <div class="party-member-node"></div>
      <div class="party-member-node"></div>
    </div>

  </div>

  <script>
    // --- HIGH FIDELITY CANVAS BACKGROUND ENGINE ---
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let atmosphericElements = [];

    function syncScreenDimensions() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', syncScreenDimensions);
    syncScreenDimensions();

    class WaterParticle {
      constructor() { this.spawn(true); }
      spawn(randomY = false) {
        this.x = Math.random() * canvas.width;
        this.y = randomY ? Math.random() * canvas.height : canvas.height + 50;
        this.radius = Math.random() * 3.5 + 1;
        this.velocityUp = -(Math.random() * 1.0 + 0.3);
        this.particleType = Math.random() > 0.88 ? 'glass' : 'bubble';
      }
      refreshState() {
        this.y += this.velocityUp;
        this.x += Math.sin(this.y * 0.015) * 0.25;
        if (this.y < -30) this.spawn(false);
      }
      render() {
        ctx.beginPath();
        if (this.particleType === 'bubble') {
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(63, 227, 255, 0.15)';
          ctx.fill();
        } else {
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x + 9, this.y + 3);
          ctx.lineTo(this.x + 3, this.y + 10);
          ctx.closePath();
          ctx.fillStyle = 'rgba(255, 255, 255, 0.07)';
          ctx.fill();
        }
      }
    }

    for(let i=0; i<40; i++) { atmosphericElements.push(new WaterParticle()); }

    function runGraphicsLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // True P3R Blue Sea Color Gradient
      let oceanGrad = ctx.createRadialGradient(canvas.width*0.75, canvas.height*0.25, 20, canvas.width*0.5, canvas.height*0.5, canvas.width);
      oceanGrad.addColorStop(0, '#00527d');
      oceanGrad.addColorStop(0.6, '#01112a');
      oceanGrad.addColorStop(1, '#000714');
      ctx.fillStyle = oceanGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      atmosphericElements.forEach(item => { item.refreshState(); item.render(); });
      requestAnimationFrame(runGraphicsLoop);
    }
    runGraphicsLoop();

    // --- INTERACTIVE ENGINE: ROTATE ACTIVE MENU RIBBON ---
    const options = document.querySelectorAll('.menu-item-row');
    options.forEach((targetOption) => {
      targetOption.addEventListener('click', () => {
        options.forEach(item => item.classList.remove('selected'));
        targetOption.classList.add('selected');
      });
    });
  </script>
</body>
</html>
