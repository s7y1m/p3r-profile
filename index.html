<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3R Social Menu Mirror</title>
  <link href="https://fonts.googleapis.com/css2?family=Impact&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark-ocean: #010d21;
      --menu-cyan: #26e6ff;
      --active-pink: #ff0055;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark-ocean);
      color: #fff;
      font-family: 'Impact', 'Arial Black', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* --- FLASH LAYER FOR IMPACTS --- */
    .screen-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
    }

    /* --- DEEP WATER BACKGROUND --- */
    #ambient-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* --- FULL SCREEN CHARACTER LAYER --- */
    .p3r-character-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 100vh;
      width: 50vw; /* Spans across the left half of the screen */
      z-index: 2;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
    }

    .p3r-character-art {
      height: 100%;
      width: auto;
      object-fit: contain;
      object-position: left bottom;
      opacity: 0;
      
      /* Smooth edge fading mask so the right side of your image melts into the canvas */
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
      mask-image: linear-gradient(to right, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);

      /* Snappy overshoot slide-in from the left */
      transform-origin: bottom left;
      animation: characterEntrance 0.6s cubic-bezier(0.15, 0.85, 0.35, 1.05) forwards;
      animation-delay: 0.05s;
    }

    /* --- MAIN INTERFACE GRID OVERLAY --- */
    .p3r-game-screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 30% 50% 20%;
      z-index: 3; /* Kept on top so menu options overlap the character hair lines */
    }

    .left-canvas-sector, .right-party-sector {
      position: relative;
      height: 100%;
    }

    /* --- CENTER SIDE: THE JAGGED MENU CONTAINER --- */
    .center-menu-sector {
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .menu-cascading-barrel {
      transform: rotateY(-22deg) rotateZ(-9deg) skewX(-6deg);
      transform-style: preserve-3d;
      width: 100%;
    }

    .menu-item-row {
      font-size: 4.8rem;
      font-style: italic;
      color: var(--menu-cyan);
      text-transform: uppercase;
      margin: -16px 0;
      cursor: pointer;
      position: relative;
      letter-spacing: -1px;
      padding-left: 30px;
      opacity: 0;
      
      animation: menuElasticIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.3) forwards;
      transition: transform 0.2s cubic-bezier(0.25, 1.25, 0.5, 1.3), color 0.1s ease;
    }

    .menu-item-row:hover {
      color: #fff;
      transform: translateX(25px) scale(1.05);
    }

    /* --- TRUE HIGH-FIDELITY ACTIVE SHARD --- */
    .menu-item-row.selected {
      color: #000 !important;
      font-size: 5.8rem;
      z-index: 10;
      padding: 2px 50px 5px 40px;
      margin: -5px 0;
      text-shadow: 4px 4px 0px var(--active-pink);
    }

    .menu-item-row.selected::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10px;
      width: 110%;
      height: 100%;
      background: #fff;
      clip-path: polygon(6% 0%, 100% 0%, 91% 100%, 0% 100%);
      z-index: -1;
      transform-origin: left center;
      animation: violentSlice 0.18s cubic-bezier(0, 0.9, 0.1, 1) forwards;
    }

    /* --- HIGH VELOCITY KEYFRAMES --- */
    @keyframes characterEntrance {
      0% { transform: scale(0.9) translateX(-300px) rotate(-4deg); opacity: 0; }
      100% { transform: scale(1) translateX(0) rotate(0deg); opacity: 1; }
    }

    @keyframes menuElasticIn {
      0% { opacity: 0; transform: translateX(-150px) scale(0.7) rotateX(30deg); }
      70% { transform: translateX(20px) scale(1.05); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes violentSlice {
      0% { transform: scaleX(0) skewX(-10deg); filter: brightness(5); }
      100% { transform: scaleX(1) skewX(0deg); filter: brightness(1); }
    }

    @keyframes flashAnimation {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    .flash-trigger {
      animation: flashAnimation 0.2s ease-out forwards;
    }
  </style>
</head>
<body>

  <div class="screen-flash" id="flash-overlay"></div>
  <canvas id="ambient-canvas"></canvas>

  <!-- Reference point updated to look for your .jpg asset verbatim -->
  <div class="p3r-character-layer">
    <img src="character.jpg" class="p3r-character-art" alt="Makoto Yuki">
  </div>

  <div class="p3r-game-screen">
    
    <div class="left-canvas-sector"></div>

    <div class="center-menu-sector">
      <div class="menu-cascading-barrel">
        <div class="menu-item-row selected" style="animation-delay: 0.04s;">Instagram</div>
        <div class="menu-item-row" style="animation-delay: 0.08s;">Roblox</div>
        <div class="menu-item-row" style="animation-delay: 0.12s;">TikTok</div>
        <div class="menu-item-row" style="animation-delay: 0.16s;">YouTube</div>
        <div class="menu-item-row" style="animation-delay: 0.20s;">Discord</div>
      </div>
    </div>

    <div class="right-party-sector"></div>

  </div>

  <script>
    // --- SNAP GRAPHICS BACKGROUND LOOP ---
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let elements = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    class Shard {
      constructor() { this.y = Math.random() * canvas.height; this.x = Math.random() * canvas.width; this.speed = -(Math.random() * 0.8 + 0.2); }
      step() {
        this.y += this.speed;
        if (this.y < -20) { this.y = canvas.height + 20; this.x = Math.random() * canvas.width; }
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + 12, this.y + 4);
        ctx.lineTo(this.x + 4, this.y + 14);
        ctx.fillStyle = 'rgba(38, 230, 255, 0.08)';
        ctx.fill();
      }
    }
    for(let i=0; i<25; i++) elements.push(new Shard());

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let g = ctx.createRadialGradient(canvas.width*0.75, canvas.height*0.3, 10, canvas.width*0.5, canvas.height*0.5, canvas.width);
      g.addColorStop(0, '#004f7c');
      g.addColorStop(0.7, '#010d21');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      elements.forEach(e => { e.step(); e.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    // --- SNAP SELECTION ENGINE ---
    const rows = document.querySelectorAll('.menu-item-row');
    const flash = document.getElementById('flash-overlay');

    rows.forEach(row => {
      row.addEventListener('click', () => {
        rows.forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');

        flash.classList.remove('flash-trigger');
        void flash.offsetWidth; 
        flash.classList.add('flash-trigger');
      });
    });
  </script>
</body>
</html>
