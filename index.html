<script>
    const isMobile = window.innerWidth <= 768;
    let soundEnabled = true;

    // --- AUDIO & SFX SYNTHESIZER ENGINE ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    // Grab BGM element and force immediate pre-buffering
    const bgm = document.getElementById('custom-bgm');
    bgm.load(); 

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new AudioCtx();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // Unlocks browser audio context on the very first user interaction
    function unlockAudio() {
      initAudio();
      
      // Warm up the HTML5 audio element without playing early
      bgm.volume = 0.4;
      const playPromise = bgm.play();
      
      if (playPromise !== undefined) {
        playPromise.then(() => {
          if (!hasStarted) {
            bgm.pause();
            bgm.currentTime = 0;
          }
        }).catch(() => {
          // Catch autoplay policy restrictions gracefully
        });
      }

      // Cleanup warm-up listeners
      window.removeEventListener('touchstart', unlockAudio);
      window.removeEventListener('keydown', unlockAudio);
      window.removeEventListener('mousedown', unlockAudio);
    }

    // Listen for early interactions to prime the audio engines
    window.addEventListener('touchstart', unlockAudio, { passive: true });
    window.addEventListener('keydown', unlockAudio);
    window.addEventListener('mousedown', unlockAudio);

    function playCustomBGM() {
      if (!soundEnabled) return;
      bgm.volume = 0.4;
      bgm.currentTime = 0;
      bgm.play().catch(() => {});
    }

    function playSFX(type, pitchModifier = 1) {
      if (!audioCtx || !soundEnabled) return;
      
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      const now = audioCtx.currentTime;

      if (type === 'hover') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440 * pitchModifier, now);
        osc.frequency.exponentialRampToValueAtTime(880 * pitchModifier, now + 0.05);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
      } else if (type === 'select') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(900, now + 0.15);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      } else if (type === 'back') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(700, now);
        osc.frequency.exponentialRampToValueAtTime(180, now + 0.18);
        gain.gain.setValueAtTime(0.18, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.18);
        osc.start(now); osc.stop(now + 0.18);
      } else if (type === 'start') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.35);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
      }
    }

    // --- HUD DATE CONTROLLER ---
    function updateHUDDate() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const date = now.getDate();
      const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      
      document.getElementById('hud-date').textContent = `${month}/${date}`;
      document.getElementById('hud-day').textContent = days[now.getDay()];

      const hours = now.getHours();
      let period = 'AFTERNOON';
      if (hours >= 5 && hours < 12) period = 'MORNING';
      else if (hours >= 12 && hours < 17) period = 'AFTERNOON';
      else if (hours >= 17 && hours < 21) period = 'EVENING';
      else period = 'DARK HOUR';

      document.getElementById('hud-period').textContent = period;
    }
    updateHUDDate();

    // Toggle Audio Button
    const audioBtn = document.getElementById('audio-toggle');
    const audioStatus = document.getElementById('audio-status');
    audioBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        audioStatus.textContent = '🔊 SFX ON';
        bgm.play().catch(() => {});
      } else {
        audioStatus.textContent = '🔇 MUTED';
        bgm.pause();
      }
    });

    // --- CANVAS PARTICLES WITH MOUSE/TOUCH MAGNETISM ---
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let bursts = [];
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Shard {
      constructor() { this.reset(); }
      reset() {
        this.y = Math.random() * canvas.height;
        this.x = Math.random() * canvas.width;
        this.speedY = -(Math.random() * 2 + 0.8);
        this.speedX = (Math.random() - 0.5) * 1.2;
        this.size = Math.random() * 2.5 + 0.8;
        this.color = Math.random() > 0.3 ? 'rgba(38, 230, 255, ' : 'rgba(255, 0, 85, ';
        this.alpha = Math.random() * 0.6 + 0.2;
      }
      step() {
        let dx = mousePos.x - this.x;
        let dy = mousePos.y - this.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 180) {
          this.x += (dx / dist) * 1.5;
          this.y += (dy / dist) * 1.5;
        }

        this.y += this.speedY;
        this.x += this.speedX;
        if (this.y < -30) this.reset();
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color + this.alpha + ')';
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(38, 230, 255, 0.8)';
        ctx.fill();
        ctx.restore();
      }
    }

    class ClickBurst {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.length = Math.random() * 40 + 20;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 12 + 6;
        this.life = 1;
      }
      step() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.life -= 0.05;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
        ctx.fillRect(0, 0, this.length, 3);
        ctx.restore();
      }
    }

    const particleCount = isMobile ? 22 : 45;
    for(let i = 0; i < particleCount; i++) particles.push(new Shard());

    function spawnBurst(x, y) {
      for(let i = 0; i < 12; i++) {
        bursts.push(new ClickBurst(x, y));
      }
    }

    // --- PARALLAX & CURSOR/TOUCH REACTIVE TEXT ANIMATION LOOP ---
    const charWrapper = document.getElementById('char-wrapper');
    const charArt = document.getElementById('char-art');
    const subpageCard = document.getElementById('subpage-card');
    const wedgeText = document.getElementById('wedge-text');
    const menuBarrel = document.getElementById('menu-barrel');
    const menuRows = Array.from(document.querySelectorAll('.menu-item-row'));

    let isGameActive = false;
    let targetX = 0, targetY = 0;
    let currentX = 0, currentY = 0;

    function handlePointerMove(clientX, clientY) {
      mousePos.x = clientX;
      mousePos.y = clientY;

      if (!isGameActive) return;
      targetX = (clientX / window.innerWidth - 0.5) * 2;
      targetY = (clientY / window.innerHeight - 0.5) * 2;

      if (document.body.classList.contains('subpage-open')) {
        subpageCard.style.transform = `skewX(-8deg) rotateY(${targetX * 12}deg) rotateX(${-targetY * 12}deg)`;
      }
    }

    document.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    document.addEventListener('click', (e) => {
      spawnBurst(e.clientX, e.clientY);
    });

    function mainRenderLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(e => { e.step(); e.draw(); });
      bursts.forEach((b, index) => {
        b.step();
        b.draw();
        if (b.life <= 0) bursts.splice(index, 1);
      });

      if (isGameActive) {
        currentX += (targetX - currentX) * 0.1;
        currentY += (targetY - currentY) * 0.1;
        
        charWrapper.style.transform = `translate3d(${currentX * -18}px, ${currentY * -10}px, 0)`;
        charArt.style.filter = `drop-shadow(${currentX * 12}px ${currentY * 12}px 25px rgba(0, 30, 140, 0.85))`;

        if (!document.body.classList.contains('subpage-open')) {
          menuBarrel.style.transform = `rotateY(${currentX * 8}deg) rotateX(${-currentY * 8}deg)`;
          
          menuRows.forEach((row, i) => {
            const isSel = row.classList.contains('selected');
            const scaleVal = isSel ? (isMobile ? 1.03 : 1.06) : (row.matches(':hover') ? 1.04 : 1.0);
            const extraX = currentX * 10 * (i + 1) * 0.2;
            const skewAngle = isMobile ? -8 : -12;
            row.style.transform = `skewX(${skewAngle}deg) translate3d(${extraX}px, 0, 0) scale(${scaleVal})`;
          });
        }
      }

      requestAnimationFrame(mainRenderLoop);
    }
    requestAnimationFrame(mainRenderLoop);

    // --- INTERACTION SYSTEM ---
    const rows = Array.from(document.querySelectorAll('.menu-item-row'));
    const flash = document.getElementById('flash-overlay');
    const blade1 = document.getElementById('blade1');
    const blade2 = document.getElementById('blade2');

    const subpageTitle = document.getElementById('subpage-title');
    const subpageDesc = document.getElementById('subpage-desc');
    const subpageImgFrame = document.getElementById('subpage-img-frame');
    const subpageImg = document.getElementById('subpage-img');
    const launchBtn = document.getElementById('launch-btn');
    const backBtn = document.getElementById('back-btn');

    let hasStarted = false;
    let selectedIndex = 0;

    function triggerTransitions(sfxType = 'select') {
      playSFX(sfxType);

      document.body.classList.remove('impact-active');
      void document.body.offsetWidth;
      document.body.classList.add('impact-active');

      blade1.classList.remove('trigger');
      blade2.classList.remove('trigger');
      void blade1.offsetWidth;
      blade1.classList.add('trigger');
      blade2.classList.add('trigger');

      flash.classList.remove('flash-trigger');
      void flash.offsetWidth; 
      flash.classList.add('flash-trigger');
    }

    function startExperience(e) {
      if (hasStarted) return;
      hasStarted = true;
      
      if (e && e.cancelable) e.preventDefault();

      playCustomBGM();
      updateHUDDate();

      document.body.classList.remove('intro-mode');
      document.body.classList.add('game-active');

      playSFX('start');

      flash.classList.remove('flash-trigger');
      void flash.offsetWidth; 
      flash.classList.add('flash-trigger');

      setTimeout(() => isGameActive = true, 600);
    }

    const startOverlay = document.getElementById('start-overlay');
    startOverlay.addEventListener('click', startExperience);
    startOverlay.addEventListener('touchend', startExperience);
    window.addEventListener('keydown', startExperience);

    function selectRow(index) {
      if (index < 0 || index >= rows.length) return;
      selectedIndex = index;
      rows.forEach((r, i) => r.classList.toggle('selected', i === selectedIndex));
      
      wedgeText.textContent = rows[selectedIndex].dataset.wedge || rows[selectedIndex].dataset.platform.toUpperCase();
    }

    function openSubpage(row) {
      triggerTransitions('select');
      subpageTitle.textContent = row.dataset.platform;
      subpageDesc.textContent = row.dataset.desc;
      launchBtn.href = row.dataset.url;

      if (row.dataset.img) {
        subpageImg.src = row.dataset.img;
        subpageImgFrame.style.display = 'block';
      } else {
        subpageImgFrame.style.display = 'none';
      }

      setTimeout(() => document.body.classList.add('subpage-open'), 150);
    }

    function closeSubpage() {
      if (!document.body.classList.contains('subpage-open')) return;
      triggerTransitions('back');
      setTimeout(() => {
        document.body.classList.remove('subpage-open');
        subpageCard.style.transform = `skewX(-8deg)`;
      }, 150);
    }

    rows.forEach((row, i) => {
      row.addEventListener('mouseenter', () => {
        if (!hasStarted || document.body.classList.contains('subpage-open') || isMobile) return;
        if (selectedIndex !== i) {
          const pitch = 0.8 + (i * 0.15);
          playSFX('hover', pitch);
          selectRow(i);
        }
      });

      const handleSelection = (e) => {
        if (!hasStarted) return;
        e.preventDefault();
        
        if (selectedIndex !== i) {
          playSFX('hover', 0.8 + (i * 0.15));
          selectRow(i);
        }
        openSubpage(row);
      };

      row.addEventListener('click', handleSelection);
    });

    backBtn.addEventListener('click', closeSubpage);

    // SWIPE GESTURES FOR MOBILE
    let touchStartY = 0;
    let touchStartX = 0;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) {
        touchStartY = e.touches[0].clientY;
        touchStartX = e.touches[0].clientX;
      }
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (!hasStarted || e.changedTouches.length === 0) return;
      const deltaY = e.changedTouches[0].clientY - touchStartY;
      const deltaX = e.changedTouches[0].clientX - touchStartX;

      const isSubpageOpen = document.body.classList.contains('subpage-open');

      if (isSubpageOpen) {
        if (deltaX > 80) closeSubpage();
        return;
      }

      if (Math.abs(deltaY) > 40 && Math.abs(deltaY) > Math.abs(deltaX)) {
        if (deltaY < 0) {
          const nextIndex = selectedIndex < rows.length - 1 ? selectedIndex + 1 : 0;
          playSFX('hover', 0.8 + (nextIndex * 0.15));
          selectRow(nextIndex);
        } else {
          const nextIndex = selectedIndex > 0 ? selectedIndex - 1 : rows.length - 1;
          playSFX('hover', 0.8 + (nextIndex * 0.15));
          selectRow(nextIndex);
        }
      }
    }, { passive: true });

    // KEYBOARD NAVIGATION
    window.addEventListener('keydown', (e) => {
      if (!hasStarted) return;
      const isSubpageOpen = document.body.classList.contains('subpage-open');

      if (isSubpageOpen) {
        if (e.key === 'Escape' || e.key === 'Backspace') closeSubpage();
        return;
      }

      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        const nextIndex = selectedIndex > 0 ? selectedIndex - 1 : rows.length - 1;
        playSFX('hover', 0.8 + (nextIndex * 0.15));
        selectRow(nextIndex);
      } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
        const nextIndex = selectedIndex < rows.length - 1 ? selectedIndex + 1 : 0;
        playSFX('hover', 0.8 + (nextIndex * 0.15));
        selectRow(nextIndex);
      } else if (e.key === 'Enter' || e.key === ' ') {
        openSubpage(rows[selectedIndex]);
      }
    });
</script>
