<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3R Social Menu Mirror</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Velvet-room navy, not water-park blue */
      --bg-deep: #05070f;
      --bg-panel: #0b1224;
      --bg-panel-2: #101b33;
      --menu-cyan: #21e6d6;
      --active-pink: #ff2d6e;
      --ink-white: #eef3ff;
      --ink-dim: #6f83ad;
      --line: rgba(33, 230, 214, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-deep);
      color: var(--ink-white);
      font-family: 'Oswald', sans-serif;
      overflow: hidden;
      position: relative;
      transition: background-color 0.4s ease;
    }

    body.game-active {
      background: var(--bg-deep);
    }

    /* --- INTRO START SCREEN --- */
    .start-screen-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: var(--bg-deep);
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    .press-start-text {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 6vw, 4rem);
      color: var(--menu-cyan);
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 3px;
      transform: skewX(-8deg);
      animation: pulseGlow 1.1s infinite alternate ease-in-out;
    }

    @keyframes pulseGlow {
      0%   { opacity: 0.45; letter-spacing: 3px; }
      100% { opacity: 1;    letter-spacing: 5px; }
    }

    body.game-active .start-screen-overlay {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* --- FLASH LAYER --- */
    .screen-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
    }

    /* --- AMBIENT BACKGROUND (velvet-room haze, not water) --- */
    #ambient-canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    body.game-active #ambient-canvas {
      opacity: 1;
    }

    /* --- DIAGONAL SPLIT UNDERLAY --- */
    .p3r-split-layout-underlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      display: flex;
    }

    .game-left-white-wedge {
      width: 34vw;
      min-width: 220px;
      height: 100%;
      background: var(--ink-white);
      position: relative;
      clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
      box-shadow: 30px 0 60px rgba(0, 0, 0, 0.35);
      opacity: 0;
      transition: opacity 0.35s ease 0.1s;
    }

    body.game-active .game-left-white-wedge {
      opacity: 1;
    }

    .game-left-white-wedge::before {
      content: 'MENU';
      position: absolute;
      bottom: -14px;
      left: -34px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: clamp(6rem, 16vw, 13rem);
      color: #dbe2f0;
      transform: rotate(-90deg);
      transform-origin: left bottom;
      letter-spacing: -4px;
      white-space: nowrap;
    }

    /* --- CHARACTER ART --- */
    .p3r-character-container {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      z-index: 3;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      transform: translateX(46vw);
      transition: transform 0.85s cubic-bezier(0.15, 0.85, 0.35, 1.02);
    }

    body.game-active .p3r-character-container {
      transform: translateX(0);
    }

    .p3r-character-art {
      height: 100%;
      width: auto;
      object-fit: contain;
      object-position: left bottom;
      border: none;
      outline: none;
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 68%, rgba(0,0,0,0) 96%);
      mask-image: linear-gradient(to right, rgba(0,0,0,1) 68%, rgba(0,0,0,0) 96%);
    }

    /* Graceful placeholder if character art fails to load or is absent */
    .p3r-character-art.art-missing {
      display: none;
    }

    .character-placeholder {
      display: none;
      align-items: flex-end;
      justify-content: center;
      height: 70%;
      width: 30vw;
      min-width: 240px;
      opacity: 0.5;
    }

    .p3r-character-container.no-art .character-placeholder {
      display: flex;
    }

    .character-placeholder svg {
      width: 60%;
      height: 100%;
    }

    /* --- MENU GRID --- */
    .p3r-game-screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 34% 50% 16%;
      z-index: 4;
    }

    .center-menu-sector {
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .menu-cascading-barrel {
      transform: rotateY(-18deg) rotateZ(-7deg) skewX(-4deg);
      transform-style: preserve-3d;
      width: 100%;
    }

    .menu-item-row {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1.6rem, 3.6vw, 3.6rem);
      font-weight: 600;
      font-style: italic;
      color: var(--menu-cyan);
      text-transform: uppercase;
      margin: -10px 0;
      cursor: pointer;
      position: relative;
      letter-spacing: 0.5px;
      padding: 6px 20px;
      opacity: 0;
      outline: none;
      transition: transform 0.2s cubic-bezier(0.25, 1.25, 0.5, 1.3), color 0.1s ease;
    }

    body.game-active .menu-item-row {
      animation: menuElasticIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
    }

    .menu-item-row:hover,
    .menu-item-row:focus-visible {
      color: #fff;
      transform: translateX(18px) scale(1.03);
    }

    .menu-item-row:focus-visible {
      text-decoration: underline wavy var(--active-pink);
    }

    .menu-item-row.selected {
      color: #060814 !important;
      font-size: clamp(1.9rem, 4.2vw, 4.3rem);
      z-index: 10;
      padding: 8px 44px 10px 36px;
      margin: -2px 0;
      text-shadow: 3px 3px 0px var(--active-pink);
    }

    .menu-item-row.selected::before {
      content: '';
      position: absolute;
      inset: 4px 0 auto 0;
      top: 4px;
      left: 0;
      width: 88%;
      height: 90%;
      background: var(--ink-white);
      clip-path: polygon(5% 0%, 100% 0%, 93% 100%, 0% 100%);
      z-index: -1;
      animation: violentSlice 0.15s cubic-bezier(0, 0.9, 0.1, 1) forwards;
    }

    /* --- BOTTOM CONTROL HINT BAR --- */
    .control-hints {
      position: absolute;
      bottom: 18px;
      right: 24px;
      z-index: 6;
      display: flex;
      gap: 22px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: var(--ink-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.4s ease 0.5s;
    }

    body.game-active .control-hints {
      opacity: 1;
    }

    .control-hints span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hint-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 4px;
      border-radius: 50%;
      border: 1px solid var(--ink-dim);
      color: var(--ink-white);
      font-size: 0.75rem;
    }

    /* --- ANIMATIONS --- */
    @keyframes menuElasticIn {
      0%   { opacity: 0; transform: translateX(-140px) scale(0.7) rotateX(20deg); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes violentSlice {
      0%   { transform: scaleX(0) skewX(-15deg); }
      100% { transform: scaleX(1) skewX(0deg); }
    }

    @keyframes flashAnimation {
      0%   { opacity: 0.7; }
      100% { opacity: 0; }
    }

    .flash-trigger {
      animation: flashAnimation 0.25s ease-out forwards;
    }

    /* --- RESPONSIVE: MOBILE --- */
    @media (max-width: 720px) {
      .p3r-game-screen {
        grid-template-columns: 1fr;
      }
      .game-left-white-wedge {
        width: 60vw;
        clip-path: polygon(0 0, 100% 0, 60% 100%, 0 100%);
      }
      .p3r-character-container {
        transform: translateX(0);
        opacity: 0;
        transition: opacity 0.6s ease;
        justify-content: flex-end;
      }
      body.game-active .p3r-character-container {
        opacity: 0.35;
      }
      .menu-cascading-barrel {
        transform: none;
      }
      .menu-item-row {
        text-align: center;
        padding: 6px 10px;
      }
      .control-hints {
        right: 12px;
        bottom: 10px;
        font-size: 0.7rem;
        gap: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .press-start-text,
      .menu-item-row,
      .p3r-character-container,
      .game-left-white-wedge {
        animation: none !important;
        transition: none !important;
      }
      body.game-active .menu-item-row {
        opacity: 1;
      }
    }
  </style>
</head>
<body class="intro-mode">

  <audio id="menu-bgm" src="bgm.mp3" loop preload="none"></audio>

  <div class="start-screen-overlay" id="start-overlay" role="button" tabindex="0" aria-label="Press to start">
    <div class="press-start-text">Press to Start</div>
  </div>

  <div class="screen-flash" id="flash-overlay"></div>
  <canvas id="ambient-canvas"></canvas>

  <div class="p3r-split-layout-underlay">
    <div class="game-left-white-wedge"></div>
  </div>

  <div class="p3r-character-container" id="character-container">
    <img src="character.png" class="p3r-character-art" id="character-art" alt="Party member portrait">
    <div class="character-placeholder" aria-hidden="true">
      <svg viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 0 L100 40 L82 160 L18 160 L0 40 Z" fill="var(--bg-panel-2)" stroke="var(--menu-cyan)" stroke-width="1.5"/>
      </svg>
    </div>
  </div>

  <div class="p3r-game-screen">
    <div class="left-canvas-sector"></div>

    <div class="center-menu-sector">
      <div class="menu-cascading-barrel" role="menu" aria-label="Social apps" id="menu-barrel">
        <div class="menu-item-row selected" role="menuitem" tabindex="0" style="animation-delay: 0.04s;">Instagram</div>
        <div class="menu-item-row" role="menuitem" tabindex="-1" style="animation-delay: 0.08s;">Roblox</div>
        <div class="menu-item-row" role="menuitem" tabindex="-1" style="animation-delay: 0.12s;">TikTok</div>
        <div class="menu-item-row" role="menuitem" tabindex="-1" style="animation-delay: 0.16s;">YouTube</div>
        <div class="menu-item-row" role="menuitem" tabindex="-1" style="animation-delay: 0.20s;">Discord</div>
      </div>
    </div>

    <div class="right-party-sector"></div>
  </div>

  <div class="control-hints">
    <span><span class="hint-key">&#9650;&#9660;</span> Select</span>
    <span><span class="hint-key">&#9166;</span> Confirm</span>
  </div>

  <script>
    // --- AMBIENT BACKGROUND: low, dark, velvet-room haze (not bright water) ---
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let motes = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Mote {
      constructor() {
        this.reset(true);
      }
      reset(initial) {
        this.x = Math.random() * canvas.width;
        this.y = initial ? Math.random() * canvas.height : canvas.height + 20;
        this.r = Math.random() * 1.6 + 0.4;
        this.speed = -(Math.random() * 0.35 + 0.1);
        this.alpha = Math.random() * 0.25 + 0.05;
      }
      step() {
        this.y += this.speed;
        if (this.y < -20) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(33, 230, 214, ${this.alpha})`;
        ctx.fill();
      }
    }
    for (let i = 0; i < 60; i++) motes.push(new Mote());

    let rafId;
    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      g.addColorStop(0, '#0b1224');
      g.addColorStop(0.55, '#070a16');
      g.addColorStop(1, '#03040a');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      motes.forEach(m => { m.step(); m.draw(); });
      rafId = requestAnimationFrame(loop);
    }
    loop();

    // Pause the animation loop when tab is hidden (battery/perf friendly)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        cancelAnimationFrame(rafId);
      } else {
        loop();
      }
    });

    // --- CHARACTER ART FALLBACK ---
    const characterArt = document.getElementById('character-art');
    const characterContainer = document.getElementById('character-container');
    characterArt.addEventListener('error', () => {
      characterArt.classList.add('art-missing');
      characterContainer.classList.add('no-art');
    }, { once: true });

    // --- SYSTEM NAVIGATION ENGINE ---
    const rows = Array.from(document.querySelectorAll('.menu-item-row'));
    const flash = document.getElementById('flash-overlay');
    const startOverlay = document.getElementById('start-overlay');
    const bgm = document.getElementById('menu-bgm');
    let activeIndex = 0;

    function triggerFlash() {
      flash.classList.remove('flash-trigger');
      void flash.offsetWidth;
      flash.classList.add('flash-trigger');
    }

    function startGame() {
      if (document.body.classList.contains('game-active')) return;
      document.body.classList.remove('intro-mode');
      document.body.classList.add('game-active');

      bgm.volume = 0.6;
      bgm.play().catch(() => {
        // Autoplay blocked or file missing — silent, non-blocking
      });

      triggerFlash();
      rows[0].focus();
    }

    startOverlay.addEventListener('click', startGame);
    startOverlay.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') startGame();
    });

    function selectRow(index) {
      rows[activeIndex].classList.remove('selected');
      rows[activeIndex].tabIndex = -1;
      activeIndex = (index + rows.length) % rows.length;
      rows[activeIndex].classList.add('selected');
      rows[activeIndex].tabIndex = 0;
      rows[activeIndex].focus();
      triggerFlash();
    }

    rows.forEach((row, i) => {
      row.addEventListener('click', () => selectRow(i));
      row.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); selectRow(activeIndex + 1); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); selectRow(activeIndex - 1); }
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectRow(i); }
      });
    });

    document.getElementById('menu-barrel').addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') { e.preventDefault(); selectRow(activeIndex + 1); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); selectRow(activeIndex - 1); }
    });
  </script>
</body>
</html>
