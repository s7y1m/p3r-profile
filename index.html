<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3R Social Menu Mirror</title>
  <link href="https://fonts.googleapis.com/css2?family=Impact&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --p3r-royal-blue: #002266;
      --menu-cyan: #38dcff; /* Adjusted to match the exact vibrant P3 neon blue */
      --active-red: #ff1a40;  /* The high-voltage P3 menu accent red */
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff; 
      color: #fff;
      font-family: 'Impact', 'Arial Black', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
      transition: background-color 0.4s ease;
    }

    body.game-active {
      background-color: var(--p3r-royal-blue);
    }

    /* --- INTRO START SCREEN OVERLAY --- */
    .start-screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: transparent;
      transition: opacity 0.4s ease, pointer-events 0.4s;
    }

    .press-start-text {
      font-size: 5.5rem;
      color: #0c1424; 
      font-style: italic;
      text-transform: uppercase;
      text-shadow: 4px 4px 0px var(--menu-cyan), -2px -2px 0px #fff;
      letter-spacing: 3px;
      transform: rotate(-5deg) skewX(-10deg);
      animation: pulseGlow 1s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955);
    }

    @keyframes pulseGlow {
      0% { opacity: 0.4; transform: rotate(-5deg) skewX(-10deg) scale(0.95); }
      100% { opacity: 1; transform: rotate(-5deg) skewX(-10deg) scale(1.05); }
    }

    body.game-active .start-screen-overlay {
      opacity: 0;
      pointer-events: none;
    }

    /* --- FLASH LAYER --- */
    .screen-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
    }

    /* --- VIBRANT BLUE WATER BACKGROUND --- */
    #ambient-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0; 
      transition: opacity 0.5s ease;
    }

    body.game-active #ambient-canvas {
      opacity: 1;
    }

    /* --- STYLIZED GAME SPLIT LAYER --- */
    .p3r-split-layout-underlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      display: flex;
    }

    .game-left-white-wedge {
      width: 32vw;
      height: 100%;
      background: #ffffff;
      position: relative;
      box-shadow: 20px 0 40px rgba(0, 0, 0, 0.15);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    body.game-active .game-left-white-wedge {
      opacity: 1;
    }

    .game-left-white-wedge::before {
      content: 'MENU';
      position: absolute;
      bottom: -20px;
      left: -30px;
      font-size: 14rem;
      color: #e3e7ee;
      transform: rotate(-90deg);
      transform-origin: left bottom;
      letter-spacing: -5px;
      opacity: 0.8;
    }

    /* --- ANTI-BORDER CHARACTER CONTAINER --- */
    .p3r-character-container {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 100vh;
      width: 100vw; 
      z-index: 3;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      
      transform: translateX(45vw);
      transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1.02);
    }

    body.game-active .p3r-character-container {
      transform: translateX(0);
    }

    .p3r-character-art {
      height: 105%;
      width: auto;
      object-fit: contain;
      object-position: left bottom;
      
      border: none !important;
      outline: none !important;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);

      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 98%);
      mask-image: linear-gradient(to right, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 98%);
    }

    /* --- HIGH-VELOCITY STYLIZED MENU SYSTEM (PERSONA 3 RELOAD ENGINE) --- */
    .p3r-game-screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 28% 62% 10%; /* widened midsection to clear text scaling bounds */
      z-index: 4;
    }

    .left-canvas-sector, .right-party-sector {
      position: relative;
      height: 100%;
    }

    .center-menu-sector {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 40px;
    }

    /* The continuous barrel rotation that controls the uniform layout slant */
    .menu-cascading-barrel {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      transform: rotate(-11deg); /* Recreates the exact slant of the original game menu */
    }

    .menu-item-row {
      font-size: 4.8rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      color: var(--menu-cyan);
      margin: -6px 0; /* Aggressive vertical compression to force text crowding */
      letter-spacing: -3px; /* Tight font tracking matches the game graphics */
      cursor: pointer;
      position: relative;
      opacity: 0;
      transform: skewX(-10deg);
      display: inline-block;
      white-space: nowrap;
      
      transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1), color 0.1s ease;
    }

    body.game-active .menu-item-row {
      animation: menuElasticIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
    }

    .menu-item-row:hover {
      color: #ffffff;
      transform: skewX(-10deg) translateX(20px);
    }

    /* Selected Button Styling - Mirroring "SKILL" from image_112e5c.png */
    .menu-item-row.selected {
      color: #000000 !important; /* Stark black text override */
      font-size: 5.4rem;
      margin: 8px 0; /* Pops outward from the stack padding boundaries */
      padding: 4px 60px 6px 30px;
      z-index: 10;
      transform: skewX(-10deg) scale(1.04) translateX(10px);
    }

    /* Sharp, Jagged White Background Wedge Component */
    .menu-item-row.selected::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      /* Dynamic polygon clipping path to create stylized slate block shapes */
      clip-path: polygon(0% 0%, 100% 0%, 90% 100%, 4% 100%);
      z-index: -2;
      transform-origin: left center;
      animation: violentSlice 0.15s cubic-bezier(0, 0.9, 0.1, 1) forwards;
    }

    /* Dramatic Red Cross-Cutting Accent Slash Component */
    .menu-item-row.selected::after {
      content: '';
      position: absolute;
      left: -15%;
      top: 38%;
      width: 130%;
      height: 24%;
      background: var(--active-red);
      z-index: -1;
      transform: rotate(-2.5deg);
      clip-path: polygon(0 20%, 100% 0, 100% 80%, 0 100%);
      pointer-events: none;
      transform-origin: left center;
      animation: violentSlice 0.18s cubic-bezier(0, 0.9, 0.1, 1) forwards;
    }

    /* --- HIGH VELOCITY ANIMATIONS --- */
    @keyframes menuElasticIn {
      0% { opacity: 0; transform: translateX(-200px) skewX(-10deg) scale(0.6); }
      100% { opacity: 1; transform: translateX(0) skewX(-10deg) scale(1); }
    }

    @keyframes violentSlice {
      0% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }

    @keyframes flashAnimation {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    .flash-trigger {
      animation: flashAnimation 0.25s ease-out forwards;
    }
  </style>
</head>
<body class="intro-mode">

  <audio id="menu-bgm" src="bgm.mp3" loop></audio>

  <div class="start-screen-overlay" id="start-overlay">
    <div class="press-start-text">Press to Start</div>
  </div>

  <div class="screen-flash" id="flash-overlay"></div>
  <canvas id="ambient-canvas"></canvas>

  <div class="p3r-split-layout-underlay">
    <div class="game-left-white-wedge"></div>
  </div>

  <div class="p3r-character-container">
    <img src="character.PNG" class="p3r-character-art" alt="Makoto Yuki">
  </div>

  <div class="p3r-game-screen">
    <div class="left-canvas-sector"></div>

    <div class="center-menu-sector">
      <div class="menu-cascading-barrel">
        <div class="menu-item-row selected" style="animation-delay: 0.04s;">Instagram</div>
        <div class="menu-item-row" style="animation-delay: 0.08s;">Roblox</div>
        <div class="menu-item-row" style="animation-delay: 0.12s;">TikTok</div>
        <div class="menu-item-row" style="animation-delay: 0.16s;">YouTube</div>
        <div class="menu-item-row" style="animation-delay: 0.20s;">Discord</div>
      </div>
    </div>

    <div class="right-party-sector"></div>
  </div>

  <script>
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let elements = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    class Shard {
      constructor() { this.y = Math.random() * canvas.height; this.x = Math.random() * canvas.width; this.speed = -(Math.random() * 1.2 + 0.4); }
      step() {
        this.y += this.speed;
        if (this.y < -20) { this.y = canvas.height + 20; this.x = Math.random() * canvas.width; }
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + 14, this.y + 4);
        ctx.lineTo(this.x + 6, this.y + 16);
        ctx.fillStyle = 'rgba(38, 230, 255, 0.15)';
        ctx.fill();
      }
    }
    for(let i=0; i<30; i++) elements.push(new Shard());

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      let g = ctx.createLinearGradient(canvas.width * 0.8, 0, canvas.width * 0.2, canvas.height);
      g.addColorStop(0, '#00bfff');    
      g.addColorStop(0.4, '#0055ff');  
      g.addColorStop(1, '#001144');    
      
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      elements.forEach(e => { e.step(); e.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    // --- SYSTEM NAVIGATION ENGINE ---
    const rows = document.querySelectorAll('.menu-item-row');
    const flash = document.getElementById('flash-overlay');
    const startOverlay = document.getElementById('start-overlay');
    const bgm = document.getElementById('menu-bgm');

    // Handle Start Screen Click Trigger
    startOverlay.addEventListener('click', () => {
      document.body.classList.remove('intro-mode');
      document.body.classList.add('game-active');

      // Play background music track safely
      bgm.volume = 0.6; 
      bgm.play().catch(error => {
        console.log("Audio playback prevented by browser settings:", error);
      });

      // Navigation flash trigger
      flash.classList.remove('flash-trigger');
      void flash.offsetWidth; 
      flash.classList.add('flash-trigger');
    });

    // Handle normal menu choices navigation
    rows.forEach(row => {
      row.addEventListener('click', () => {
        rows.forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');

        flash.classList.remove('flash-trigger');
        void flash.offsetWidth; 
        flash.classList.add('flash-trigger');
      });
    });
  </script>
</body>
</html>
