<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3R Social Menu Mirror</title>
  <link href="https://fonts.googleapis.com/css2?family=Impact&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --p3r-royal-blue: #002266;
      --menu-cyan: #26e6ff;
      --active-pink: #ff0055;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      /* Starts pure white so the character image background blends seamlessly */
      background-color: #ffffff; 
      color: #fff;
      font-family: 'Impact', 'Arial Black', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
      transition: background-color 0.4s ease;
    }

    body.game-active {
      background-color: var(--p3r-royal-blue);
    }

    /* --- INTRO START SCREEN OVERLAY --- */
    .start-screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: transparent;
      transition: opacity 0.4s ease, pointer-events 0.4s;
    }

    .press-start-text {
      font-size: 5.5rem;
      /* Dark stylized fill to stand out beautifully against the white background */
      color: #0c1424; 
      font-style: italic;
      text-transform: uppercase;
      text-shadow: 4px 4px 0px var(--menu-cyan), -2px -2px 0px #fff;
      letter-spacing: 3px;
      transform: rotate(-5deg) skewX(-10deg);
      animation: pulseGlow 1s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955);
    }

    @keyframes pulseGlow {
      0% { opacity: 0.4; transform: rotate(-5deg) skewX(-10deg) scale(0.95); }
      100% { opacity: 1; transform: rotate(-5deg) skewX(-10deg) scale(1.05); }
    }

    /* Hide Start UI once clicked */
    body.game-active .start-screen-overlay {
      opacity: 0;
      pointer-events: none;
    }

    /* --- FLASH LAYER --- */
    .screen-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
    }

    /* --- VIBRANT BLUE WATER BACKGROUND --- */
    #ambient-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0; /* Hidden during intro */
      transition: opacity 0.5s ease;
    }

    body.game-active #ambient-canvas {
      opacity: 1;
    }

    /* --- STYLIZED GAME SPLIT LAYER --- */
    .p3r-split-layout-underlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      display: flex;
    }

    .game-left-white-wedge {
      width: 32vw;
      height: 100%;
      background: #ffffff;
      position: relative;
      box-shadow: 20px 0 40px rgba(0, 0, 0, 0.15);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Reveal structural wedge shadow details only when menu is active */
    body.game-active .game-left-white-wedge {
      opacity: 1;
    }

    .game-left-white-wedge::before {
      content: 'MENU';
      position: absolute;
      bottom: -20px;
      left: -30px;
      font-size: 14rem;
      color: #e3e7ee;
      transform: rotate(-90deg);
      transform-origin: left bottom;
      letter-spacing: -5px;
      opacity: 0.8;
    }

    /* --- DYNAMIC POSITIONED CHARACTER LAYER --- */
    .p3r-character-container {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 100vh;
      width: 50vw;
      z-index: 3;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      
      /* Smooth staging position on the right side */
      transform: translateX(45vw);
      transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.35, 1.02);
    }

    /* Snaps cleanly to the left menu layout side upon start */
    body.game-active .p3r-character-container {
      transform: translateX(0);
    }

    .p3r-character-art {
      height: 105%;
      width: auto;
      object-fit: contain;
      object-position: left bottom;
      
      border: none !important;
      outline: 1px solid transparent;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);

      /* Dual masking handles asset side-fading into the animated water */
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 98%);
      mask-image: linear-gradient(to right, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 98%);
    }

    /* --- INTERACTIVE MENU COLUMN OVERLAY --- */
    .p3r-game-screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 32% 52% 16%;
      z-index: 4;
    }

    .left-canvas-sector, .right-party-sector {
      position: relative;
      height: 100%;
    }

    .center-menu-sector {
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .menu-cascading-barrel {
      transform: rotateY(-20deg) rotateZ(-8deg) skewX(-4deg);
      transform-style: preserve-3d;
      width: 100%;
    }

    .menu-item-row {
      font-size: 4.4rem;
      font-style: italic;
      color: var(--menu-cyan);
      text-transform: uppercase;
      margin: -12px 0;
      cursor: pointer;
      position: relative;
      letter-spacing: -1px;
      padding-left: 20px;
      opacity: 0;
      
      transition: transform 0.2s cubic-bezier(0.25, 1.25, 0.5, 1.3), color 0.1s ease;
    }

    /* Menu strings cascade into frame only after clicking start */
    body.game-active .menu-item-row {
      animation: menuElasticIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
    }

    .menu-item-row:hover {
      color: #fff;
      transform: translateX(20px) scale(1.03);
    }

    .menu-item-row.selected {
      color: #000 !important;
      font-size: 5.2rem;
      z-index: 10;
      padding: 4px 40px 6px 35px;
      margin: -2px 0;
      text-shadow: 3px 3px 0px var(--active-pink);
    }

    .menu-item-row.selected::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 0px;
      width: 85%;
      height: 90%;
      background: #ffffff;
      clip-path: polygon(5% 0%, 100% 0%, 93% 100%, 0% 100%);
      z-index: -1;
      transform-origin: left center;
      animation: violentSlice 0.15s cubic-bezier(0, 0.9, 0.1, 1) forwards;
    }

    /* --- HIGH VELOCITY ANIMATIONS --- */
    @keyframes menuElasticIn {
      0% { opacity: 0; transform: translateX(-150px) scale(0.7) rotateX(20deg); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes violentSlice {
      0% { transform: scaleX(0) skewX(-15deg); }
      100% { transform: scaleX(1) skewX(0deg); }
    }

    @keyframes flashAnimation {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    .flash-trigger {
      animation: flashAnimation 0.25s ease-out forwards;
    }
  </style>
</head>
<body class="intro-mode">

  <div class="start-screen-overlay" id="start-overlay">
    <div class="press-start-text">Press to Start</div>
  </div>

  <div class="screen-flash" id="flash-overlay"></div>
  <canvas id="ambient-canvas"></canvas>

  <div class="p3r-split-layout-underlay">
    <div class="game-left-white-wedge"></div>
  </div>

  <div class="p3r-character-container">
    <img src="character.PNG" class="p3r-character-art" alt="Makoto Yuki">
  </div>

  <div class="p3r-game-screen">
    <div class="left-canvas-sector"></div>

    <div class="center-menu-sector">
      <div class="menu-cascading-barrel">
        <div class="menu-item-row selected" style="animation-delay: 0.04s;">Instagram</div>
        <div class="menu-item-row" style="animation-delay: 0.08s;">Roblox</div>
        <div class="menu-item-row" style="animation-delay: 0.12s;">TikTok</div>
        <div class="menu-item-row" style="animation-delay: 0.16s;">YouTube</div>
        <div class="menu-item-row" style="animation-delay: 0.20s;">Discord</div>
      </div>
    </div>

    <div class="right-party-sector"></div>
  </div>

  <script>
    const canvas = document.getElementById('ambient-canvas');
    const ctx = canvas.getContext('2d');
    let elements = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    class Shard {
      constructor() { this.y = Math.random() * canvas.height; this.x = Math.random() * canvas.width; this.speed = -(Math.random() * 1.2 + 0.4); }
      step() {
        this.y += this.speed;
        if (this.y < -20) { this.y = canvas.height + 20; this.x = Math.random() * canvas.width; }
      }
      draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + 14, this.y + 4);
        ctx.lineTo(this.x + 6, this.y + 16);
        ctx.fillStyle = 'rgba(38, 230, 255, 0.15)';
        ctx.fill();
      }
    }
    for(let i=0; i<30; i++) elements.push(new Shard());

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      let g = ctx.createLinearGradient(canvas.width * 0.8, 0, canvas.width * 0.2, canvas.height);
      g.addColorStop(0, '#00bfff');    
      g.addColorStop(0.4, '#0055ff');  
      g.addColorStop(1, '#001144');    
      
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      elements.forEach(e => { e.step(); e.draw(); });
      requestAnimationFrame(loop);
    }
    loop();

    // --- SYSTEM NAVIGATION ENGINE ---
    const rows = document.querySelectorAll('.menu-item-row');
    const flash = document.getElementById('flash-overlay');
    const startOverlay = document.getElementById('start-overlay');

    // Handle Start Screen Click Trigger
    startOverlay.addEventListener('click', () => {
      document.body.classList.remove('intro-mode');
      document.body.classList.add('game-active');

      // Unleash the iconic navigation flash effect
      flash.classList.remove('flash-trigger');
      void flash.offsetWidth; 
      flash.classList.add('flash-trigger');
    });

    // Handle normal menu choices navigation
    rows.forEach(row => {
      row.addEventListener('click', () => {
        rows.forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');

        flash.classList.remove('flash-trigger');
        void flash.offsetWidth; 
        flash.classList.add('flash-trigger');
      });
    });
  </script>
</body>
</html>
